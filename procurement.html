function formatDateKey(date){
let year = date.getUTCFullYear();
let month = String(date.getUTCMonth() + 1).padStart(2, "0");
let day = String(date.getUTCDate()).padStart(2, "0");
return year + "-" + month + "-" + day;
}

function parseDateKey(dateKey){
if (!dateKey || !/^\d{4}-\d{2}-\d{2}$/.test(String(dateKey).trim())) return new Date(NaN);
let [year, month, day] = String(dateKey).split("-").map(Number);
return new Date(Date.UTC(year, month - 1, day));
}

function normalizeDateValue(value){
if (!value) return "";
if (value instanceof Date && !Number.isNaN(value.getTime())){
  return formatDateKey(value);
}
let raw = String(value).trim();
if (!raw) return "";
if (/^\d{4}-\d{2}-\d{2}$/.test(raw)){
  return raw;
}
let isoMatch = raw.match(/^(\d{4}-\d{2}-\d{2})T/);
if (isoMatch){
  return isoMatch[1];
}
let ruMatch = raw.match(/^(\d{2})\.(\d{2})\.(\d{4})$/);
if (ruMatch){
  return `${ruMatch[3]}-${ruMatch[2]}-${ruMatch[1]}`;
}
let parsed = new Date(raw);
if (!Number.isNaN(parsed.getTime())){
  return formatDateKey(parsed);
}
return "";
}

function formatMoney(value){
return Number(value || 0).toLocaleString("ru-RU") + " ₽";
}

function formatDateLabel(dateKey){
if (!dateKey) return "—";
let date = parseDateKey(dateKey);
if (Number.isNaN(date.getTime())) return "—";
return date.toLocaleDateString("ru-RU", { day: "numeric", month: "long", timeZone: "UTC" });
}

function escapeHtml(value){
return String(value ?? "")
  .replaceAll("&", "&amp;")
  .replaceAll("<", "&lt;")
  .replaceAll(">", "&gt;")
  .replaceAll('"', "&quot;");
}

function addDays(date, amount){
let copy = new Date(date);
copy.setUTCDate(copy.getUTCDate() + amount);
return copy;
}

function getMonday(date){
let copy = new Date(date);
let day = copy.getUTCDay();
let diff = day === 0 ? -6 : 1 - day;
copy.setUTCDate(copy.getUTCDate() + diff);
copy.setUTCHours(0, 0, 0, 0);
return copy;
}

function getWeekLabel(weekStartKey){
let weekStart = parseDateKey(weekStartKey);
if (Number.isNaN(weekStart.getTime())) return "—";
let weekEnd = addDays(weekStart, 6);
let startLabel = weekStart.toLocaleDateString("ru-RU", { day: "numeric", month: "long", timeZone: "UTC" });
let endLabel = weekEnd.toLocaleDateString("ru-RU", { day: "numeric", month: "long", timeZone: "UTC" });
return startLabel + " - " + endLabel;
}

function getWeekRangeMeta(weekStartKey){
let weekStart = parseDateKey(weekStartKey);
if (Number.isNaN(weekStart.getTime())){
return {
start: null,
end: null,
endKey: ""
};
}
let weekEnd = addDays(weekStart, 6);
return {
start: weekStart,
end: weekEnd,
endKey: formatDateKey(weekEnd)
};
}

function decodeJwt(token){
try {
let payload = token.split(".")[1];
let base64 = payload.replace(/-/g, "+").replace(/_/g, "/");
let normalized = decodeURIComponent(
atob(base64)
  .split("")
  .map((character) => "%" + ("00" + character.charCodeAt(0).toString(16)).slice(-2))
  .join("")
);
return JSON.parse(normalized);
} catch (error){
return null;
}
}

function getMonthCostConfig(targetYear, targetMonth){
let monthKey = String(targetYear) + "-" + String(targetMonth + 1).padStart(2, "0");
let firstDayKey = monthKey + "-01";
let firstDayEntry = revenueData[firstDayKey];
let directMonthKey = monthKey + "_costPercent";
let directFirstDayKey = firstDayKey + "_costPercent";
let candidates = [
revenueData[directMonthKey],
revenueData[directFirstDayKey],
firstDayEntry && typeof firstDayEntry === "object" ? firstDayEntry.costPercent : null
];

if (typeof firstDayEntry === "string"){
let normalized = firstDayEntry.replace(",", ".").trim();
if (normalized.startsWith("{") && normalized.endsWith("}")){
try {
let parsed = JSON.parse(normalized);
if (parsed && parsed.costPercent != null){
candidates.push(parsed.costPercent);
}
} catch (error){}
}
}

for (let candidate of candidates){
let value = Number(candidate);
if (!Number.isNaN(value) && value > 0){
return value;
}
}

return 54.6;
}

function getRevenueValue(entry){
if (entry && typeof entry === "object" && !Array.isArray(entry)){
return Number(entry.revenue || entry.value || 0);
}

if (typeof entry === "string"){
let normalized = entry.replace(",", ".").trim();
if (normalized.startsWith("{") && normalized.endsWith("}")){
try {
let parsed = JSON.parse(normalized);
return Number(parsed.revenue || parsed.value || 0);
} catch (error){
return Number(entry || 0);
}
}
}

return Number(entry || 0);
}

function calculateCost(value, targetYear, targetMonth){
return Math.round(Number(value || 0) * (getMonthCostConfig(targetYear, targetMonth) / 100));
}

async function loadRevenueData(){
let response = await fetch(procurementConfig.revenueApiUrl, { cache: "no-store" });
if (!response.ok){
throw new Error("Не удалось загрузить выручку: HTTP " + response.status);
}
let json = await response.json();
revenueData = json && typeof json === "object" ? json : {};
}

function getOrdersForWeek(weekStartKey){

}

}

function getWeekOverrideMeta(weekStartKey){
return procurementState.weeks.find((entry) => entry.week_start === weekStartKey) || null;
}

function getWeekBaseBudget(weekStartKey){
let currentWeekStart = parseDateKey(weekStartKey);
let previousWeekStart = addDays(currentWeekStart, -7);
let previousWeekEnd = addDays(previousWeekStart, 6);
 let todayDate = parseDateKey(formatDateKey(today));
if (previousWeekEnd >= todayDate){
return 0;
}

let totalCost = 0;
for (let step = 0; step < 7; step++){
let current = addDays(previousWeekStart, step);
let dateKey = formatDateKey(current);
let revenue = getRevenueValue(revenueData[dateKey]);
if (revenue <= 0) continue;
totalCost += calculateCost(revenue, current.getFullYear(), current.getMonth());
}
return totalCost;
}

function getBudgetForPreviousSevenDays(targetWeekStartKey){
let weekStart = parseDateKey(targetWeekStartKey);
if (Number.isNaN(weekStart.getTime())) return 0;
let rangeStart = addDays(weekStart, -7);
let totalCost = 0;
for (let step = 0; step < 7; step++){
let current = addDays(rangeStart, step);
let dateKey = formatDateKey(current);
let revenue = getRevenueValue(revenueData[dateKey]);
if (revenue <= 0) continue;
totalCost += calculateCost(revenue, current.getUTCFullYear(), current.getUTCMonth());
}
return totalCost;
}

function getAutoBudgetForWeek(weekStartKey){
if (weekStartKey === getNextMondayKey()){
return getBudgetForPreviousSevenDays(weekStartKey);
}
return getWeekBaseBudget(weekStartKey);
}

function getEffectiveBudget(weekStartKey){
let base = getAutoBudgetForWeek(weekStartKey);
let meta = getWeekOverrideMeta(weekStartKey);
let override = Number(meta && meta.budget_override || 0);
return Math.max(base, override);
}

function isArchivedPaid(order){
if (!order.paid_at) return false;
let paidAt = new Date(order.paid_at);
let hideAt = addDays(paidAt, 3);
return hideAt < today;
}

function getNextMondayKey(){
let monday = getMonday(today);
let mondayKey = formatDateKey(monday);
let todayKey = formatDateKey(today);
if (mondayKey <= todayKey){
  monday = addDays(monday, 7);
}
return formatDateKey(monday);
}

function isPlanCompleted(weekStartKey){
let meta = getWeekOverrideMeta(weekStartKey);
return Boolean(meta && meta.plan_done_at);
}

function hasPlanActivity(weekStartKey){
return procurementState.orders.some((order) => order.week_start === weekStartKey) || Boolean(getWeekOverrideMeta(weekStartKey));
}

function getActivePlanWeekKey(){
let currentMondayKey = formatDateKey(getMonday(today));
let nextMondayKey = getNextMondayKey();
if (currentMondayKey === formatDateKey(today) && !isPlanCompleted(currentMondayKey)){
return currentMondayKey;
}
if (currentMondayKey !== nextMondayKey && hasPlanActivity(currentMondayKey) && !isPlanCompleted(currentMondayKey)){
return currentMondayKey;
}
let cursor = parseDateKey(nextMondayKey);
for (let step = 0; step < 26; step++){
let candidateKey = formatDateKey(cursor);
if (!isPlanCompleted(candidateKey)){
return candidateKey;
}
cursor = addDays(cursor, 7);
}
return nextMondayKey;
}

function getPlanBudgetMeta(weekStartKey){
let base = getAutoBudgetForWeek(weekStartKey);
let effective = getEffectiveBudget(weekStartKey);
let spent = procurementState.orders
  .filter((order) => !order.paid_at && !isArchivedPaid(order) && order.week_start === weekStartKey)
  .reduce((sum, order) => sum + Number(order.order_amount || 0), 0);
return {
  base,
  effective,
  spent,
  remaining: effective - spent
};
}

function canFitIntoPlanBudget(orderId, nextValue, weekStartKey){
let meta = getPlanBudgetMeta(weekStartKey);
let otherSpent = procurementState.orders
  .filter((order) => !order.paid_at && !isArchivedPaid(order) && order.week_start === weekStartKey && order.id !== orderId)
  .reduce((sum, order) => sum + Number(order.order_amount || 0), 0);
return otherSpent + Number(nextValue || 0) <= meta.effective;
}

function getDueGroupMeta(order){
let status = getComputedStatus(order);
if (status.key === "overdue"){
  return {
    key: "overdue",
    title: "Просроченные оплаты",
    meta: "Счета, у которых дата оплаты уже прошла",
    className: "dueGroup overdue"
  };
}
let dueKey = normalizeDateValue(order.payment_due_date);
if (!dueKey){
  return {
    key: "no-date",
    title: "Без даты оплаты",
    meta: "Поставщики, где дата оплаты ещё не заполнена",
    className: "dueGroup"
  };
}
let mondayKey = formatDateKey(getMonday(parseDateKey(dueKey)));
let currentMondayKey = formatDateKey(getMonday(today));
return {
  key: mondayKey,
  title: getWeekLabel(mondayKey),
  meta: "Оплаты, попадающие в это окно недели",
  className: mondayKey === currentMondayKey ? "dueGroup currentWindow" : "dueGroup"
};
}

function getComputedStatus(order){
if (order.paid_at){
return {
key: "paid",
label: "Оплачено"
};
}

let dueDate = order.payment_due_date ? parseDateKey(order.payment_due_date) : null;
if (dueDate && !Number.isNaN(dueDate.getTime()) && dueDate < today){
return {
key: "overdue",
label: "Просрочено"
};
}

if (!order.invoice_file_url){
return {
key: "waiting",
label: "Ожидает счет"
};
}

return {
key: "payable",
label: "К оплате"
};
}

function canMarkPaid(){

function getDefaultDueDate(orderDateKey){
if (!orderDateKey) return "";
return formatDateKey(addDays(parseDateKey(orderDateKey), 14));
}

function isPlanPending(order, weekStartKey){
if (order.week_start !== weekStartKey) return false;
return !normalizeDateValue(order.order_date);
}

function isOrdered(order){
return Boolean(normalizeDateValue(order.order_date));
}

function normalizeOrder(order, weekStartKey = ""){
let normalizedWeekStart = normalizeDateValue(order.week_start || weekStartKey);
let explicitEmptyOrderDate = Object.prototype.hasOwnProperty.call(order, "order_date") && order.order_date === "";
let orderDate = explicitEmptyOrderDate
  ? ""
  : (normalizeDateValue(order.order_date) || normalizedWeekStart || formatDateKey(today));
let defaultDue = getDefaultDueDate(orderDate);
let explicitEmptyDueDate = Object.prototype.hasOwnProperty.call(order, "payment_due_date") && order.payment_due_date === "";
let paymentDueDate = explicitEmptyDueDate ? "" : (normalizeDateValue(order.payment_due_date) || defaultDue);
return {
id: order.id || ("local-" + Date.now() + "-" + Math.random().toString(16).slice(2, 8)),
week_start: normalizedWeekStart,
supplier_name: order.supplier_name || "",
order_amount: Number(order.order_amount || 0),
order_date: orderDate,
payment_due_date: paymentDueDate,
invoice_file_url: order.invoice_file_url || "",
invoice_file_name: order.invoice_file_name || "",
paid_at: order.paid_at || "",
status: order.status || "",
notes: order.notes || "",
created_at: order.created_at || "",
updated_at: order.updated_at || "",
isLocalOnly: !order.id
};
}

function buildVisibleWeekKeys(){
let currentMonday = getMonday(today);
let start = addDays(currentMonday, -28);
let end = addDays(currentMonday, 77);
let result = [];
for (let cursor = new Date(start); cursor <= end; cursor = addDays(cursor, 7)){
result.push(formatDateKey(cursor));
}
for (let order of procurementState.orders){
if (!order.week_start) continue;
if (!result.includes(order.week_start)){
result.push(order.week_start);
}
}
return result.sort();
}

function renderWeeks(){
let container = document.getElementById("weeksList");
let allOrders = [...procurementState.orders].sort((left, right) => {
  let leftDue = left.payment_due_date || left.order_date || "9999-12-31";
  let rightDue = right.payment_due_date || right.order_date || "9999-12-31";
  return leftDue.localeCompare(rightDue);
});
let activeOrders = allOrders.filter((order) => !order.paid_at && !isArchivedPaid(order));
let paidOrders = allOrders.filter((order) => order.paid_at && !isArchivedPaid(order));
let activePlanWeekKey = getActivePlanWeekKey();
let planOrders = activeOrders.filter((order) => isPlanPending(order, activePlanWeekKey));
let groupedOrders = activeOrders.filter((order) => !isPlanPending(order, activePlanWeekKey));
let spent = activeOrders
  .filter((order) => isOrdered(order))
  .reduce((sum, order) => sum + Number(order.order_amount || 0), 0);
let overdueCount = activeOrders.filter((order) => getComputedStatus(order).key === "overdue").length;
let waitingCount = activeOrders.filter((order) => !order.invoice_file_url).length;
let nextMondayBudgetMeta = getPlanBudgetMeta(activePlanWeekKey);
let previousPlanRangeStart = formatDateLabel(formatDateKey(addDays(parseDateKey(activePlanWeekKey), -7)));
let previousPlanRangeEnd = formatDateLabel(formatDateKey(addDays(parseDateKey(activePlanWeekKey), -1)));
let planIsDone = isPlanCompleted(activePlanWeekKey);
 let groupMap = new Map();
 for (let order of groupedOrders){
   let meta = getDueGroupMeta(order);
   if (!groupMap.has(meta.key)){
     groupMap.set(meta.key, {
       meta,
       orders: []
     });
   }
   groupMap.get(meta.key).orders.push(order);
 }
 let groups = Array.from(groupMap.values()).sort((left, right) => {
   if (left.meta.key === "overdue") return -1;
   if (right.meta.key === "overdue") return 1;
   if (left.meta.key === "no-date") return 1;
   if (right.meta.key === "no-date") return -1;
   return left.meta.key.localeCompare(right.meta.key);
 });

        <div class="budgetStatMeta">${activeOrders.length ? "Активные строки списка" : "Пока без заказов"}</div>
      </div>
      <div class="budgetStat">
        <div class="budgetStatLabel">Просрочки</div>
        <div class="budgetStatValue ${overdueCount ? "negative" : ""}">${overdueCount}</div>
        <div class="budgetStatMeta">Поставщики с просрочкой по оплате</div>
      </div>
      <div class="budgetStat">
        <div class="budgetStatLabel">Ждут счет</div>
        <div class="budgetStatValue">${waitingCount}</div>
        <div class="budgetStatMeta">Строки без загруженного счета</div>
      </div>
    </div>
  </div>
  ${groupsHtml}
  <div class="addOrderRow">
    <button class="plainButton secondary" data-role="add-order-global" type="button">+ Добавить поставщика вне плана</button>
  </div>
  ${archivedHtml}
</article>`;
}

function renderOrderRow(order, isArchived = false, options = {}){
let isPlanned = Boolean(options.planned);
let planStartKey = options.planStartKey || "";
let canEditPlannedDates = !isPlanned || formatDateKey(today) >= planStartKey;
let status = getComputedStatus(order);
let paidDateLabel = order.paid_at ? new Date(order.paid_at).toLocaleDateString("ru-RU", { timeZone: "UTC" }) : "—";
let dueDateHtml = `<div class="dateFieldWrap">
      <input class="fieldDate order-input" data-field="payment_due_date" data-order-id="${escapeHtml(order.id)}" type="date" value="${escapeHtml(order.payment_due_date || "")}" ${(isArchived || !canEditPlannedDates) ? "disabled" : ""}>
    </div>`;
let invoiceHtml = order.invoice_file_url
  ? `<a class="invoiceLink" href="${escapeHtml(order.invoice_file_url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(order.invoice_file_name || "Открыть счет")}</a>`
  : `<div class="invoiceLink muted">Счет не загружен</div>`;
let paidButtonHtml = order.paid_at
  ? `<div class="rowHint">Оплачено ${escapeHtml(paidDateLabel)}</div>`
  : (canMarkPaid() && !isArchived
    ? `<button class="plainButton" data-role="mark-paid" data-order-id="${escapeHtml(order.id)}" type="button">Оплачено</button>`
    : `<div class="rowHint">Только владелец подтверждает оплату</div>`);

return `
<div class="orderRow ${status.key}" data-order-id="${escapeHtml(order.id)}">
  <label class="orderField">
    <span class="orderFieldLabel">Поставщик</span>
    <div class="supplierFieldWrap">
      <input class="fieldInput order-input" data-field="supplier_name" data-order-id="${escapeHtml(order.id)}" type="text" value="${escapeHtml(order.supplier_name)}" placeholder="Например, Урал Табак" ${isArchived ? "disabled" : ""}>
    </div>
  </label>
  <label class="orderField">
    <span class="orderFieldLabel">Сумма</span>
    <input class="fieldNumber order-input" data-field="order_amount" data-order-id="${escapeHtml(order.id)}" type="number" min="0" step="1" value="${order.order_amount ? Math.round(order.order_amount) : ""}" placeholder="0" ${isArchived ? "disabled" : ""}>
  </label>
  <label class="orderField">
    <span class="orderFieldLabel">Дата заказа</span>
    <input class="fieldDate order-input" data-field="order_date" data-order-id="${escapeHtml(order.id)}" type="date" value="${escapeHtml(order.order_date || "")}" ${(isArchived || !canEditPlannedDates) ? "disabled" : ""} placeholder="${isPlanned ? "В день закупа" : ""}">
  </label>
  <label class="orderField">
    <span class="orderFieldLabel">Дата оплаты</span>
    ${dueDateHtml}
  </label>
  <div class="orderField invoiceCell">
    <span class="orderFieldLabel">Счет</span>
    <div class="invoiceInline">
      ${invoiceHtml}
      ${isArchived || order.invoice_file_url ? "" : `
      <input class="invoiceInput" id="invoice-${escapeHtml(order.id)}" data-order-id="${escapeHtml(order.id)}" type="file" accept=".pdf,.jpg,.jpeg,.png,.webp,.heic">
      <button class="plainButton ghost iconButton" title="Загрузить счет" aria-label="Загрузить счет" data-role="pick-invoice" data-order-id="${escapeHtml(order.id)}" type="button">↑</button>`}
    </div>
  </div>
  <div class="orderField">
    <span class="orderFieldLabel">Статус</span>
    <div class="statusPill ${status.key}">${status.label}</div>
  </div>
  <div class="orderField rowActions">
    <span class="orderFieldLabel">Оплачено</span>
    <div class="rowActionsStack">
      ${paidButtonHtml}
      ${isArchived ? "" : `<button class="plainButton ghost iconButton" title="Удалить строку" aria-label="Удалить строку" data-role="delete-order" data-order-id="${escapeHtml(order.id)}" type="button">×</button>`}
    </div>
  </div>
</div>`;
}

async function callProcurementApi(action, payload = {}){
if (!isConfigReady()){
throw new Error("Сначала укажи googleClientId и apiUrl в procurement.html");
}
let body = new URLSearchParams();
body.set("payload", JSON.stringify(Object.assign({
action,
idToken: procurementState.idToken
}, payload)));
let response = await fetch(procurementConfig.apiUrl, {
method: "POST",
body,
cache: "no-store"
});
if (!response.ok){
throw new Error("API HTTP " + response.status);
}
let json = await response.json();
if (!json || json.ok === false){
throw new Error(json && json.error ? json.error : "Не удалось выполнить запрос");
}
return json;
}

async function bootstrapProcurement(){
setLoading(true, "Проверяю доступ и загружаю закуп…");
hideNotices();
try {
await loadRevenueData();
let result = await callProcurementApi("bootstrap", {
today: formatDateKey(today)
});
procurementState.user = result.user || procurementState.user;
procurementState.weeks = Array.isArray(result.weeks) ? result.weeks : [];
procurementState.orders = Array.isArray(result.orders) ? result.orders.map((order) => normalizeOrder(order, order.week_start)) : [];
procurementState.driveFolderUrl = result.driveFolderUrl || "";
saveSession();
renderAuthState();
renderWeeks();
document.getElementById("sectionSubtext").textContent = "Пользователь: " + procurementState.user.email + ". Роль: " + procurementState.user.role + ".";
} catch (error){
showAuthNotice(error.message, "error");
clearSession();
renderAuthState();
} finally {
setLoading(false);
}
}

function upsertLocalOrder(order){
let normalized = normalizeOrder(order, order.week_start);
let index = procurementState.orders.findIndex((entry) => {
return entry.id === normalized.id || (order.client_id && entry.isLocalOnly && entry.id === order.client_id);
});
if (index >= 0){
procurementState.orders[index] = Object.assign({}, procurementState.orders[index], normalized, { isLocalOnly: false });
} else {
procurementState.orders.push(normalized);
}
renderWeeks();
}

function getOrderById(orderId){
return procurementState.orders.find((order) => order.id === orderId);
}

function removeOrderById(orderId){
let index = procurementState.orders.findIndex((order) => order.id === orderId);
if (index >= 0){
procurementState.orders.splice(index, 1);
}
renderWeeks();
}

function queueOrderSave(orderId){
window.clearTimeout(saveTimers[orderId]);
saveTimers[orderId] = window.setTimeout(() => {
saveOrder(orderId);
}, 450);
}

async function saveOrder(orderId){
let order = getOrderById(orderId);
if (!order) return;
if (!order.supplier_name.trim() && !order.order_amount){
renderWeeks();
return;
}
try {
let result = await callProcurementApi("saveOrder", {
order: {
id: order.isLocalOnly ? "" : order.id,
client_id: order.id,
week_start: order.week_start,
supplier_name: order.supplier_name,
order_amount: Number(order.order_amount || 0),
order_date: order.order_date,
payment_due_date: order.payment_due_date,
invoice_file_url: order.invoice_file_url,
invoice_file_name: order.invoice_file_name,
paid_at: order.paid_at,
notes: order.notes || ""
}
});
if (result.order && order.isLocalOnly){
result.order.client_id = order.id;
}
upsertLocalOrder(result.order || order);
} catch (error){
showAuthNotice("Не удалось сохранить строку закупа: " + error.message, "error");
}
}

async function saveBudgetOverride(weekStartKey, overrideValue){
try {
let baseBudget = getAutoBudgetForWeek(weekStartKey);
let numericValue = Math.max(Number(overrideValue || 0), baseBudget);
let result = await callProcurementApi("setBudgetOverride", {
week_start: weekStartKey,
budget_override: numericValue,
budget_base: baseBudget
});
let index = procurementState.weeks.findIndex((entry) => entry.week_start === weekStartKey);
if (index >= 0){
procurementState.weeks[index] = result.week;
} else {
procurementState.weeks.push(result.week);
}
hideNotices();
renderWeeks();
} catch (error){
showAuthNotice("Не удалось обновить бюджет недели: " + error.message, "error");
}
}

async function completePlan(weekStartKey){
let pendingPlanOrders = procurementState.orders.filter((order) => isPlanPending(order, weekStartKey));
if (pendingPlanOrders.length){
showAuthNotice("Сначала заверши все строки плана: у всех поставь дату заказа.", "error");
return;
}
try {
let result = await callProcurementApi("completePlan", {
week_start: weekStartKey
});
let index = procurementState.weeks.findIndex((entry) => entry.week_start === weekStartKey);
if (index >= 0){
procurementState.weeks[index] = result.week;
} else {
procurementState.weeks.push(result.week);
}
hideNotices();
renderWeeks();
} catch (error){
showAuthNotice("Не удалось закрыть план закупа: " + error.message, "error");
}
}

async function uploadInvoice(orderId, file){
if (!file) return;
let order = getOrderById(orderId);
if (!order) return;
showAuthNotice("Загружаю счет " + file.name + "…");
try {
let base64 = await new Promise((resolve, reject) => {
let reader = new FileReader();
reader.onload = () => resolve(String(reader.result).split(",")[1] || "");
reader.onerror = reject;
reader.readAsDataURL(file);
});
let result = await callProcurementApi("uploadInvoice", {
order_id: order.isLocalOnly ? "" : order.id,
client_id: order.id,
week_start: order.week_start,
file_name: file.name,
mime_type: file.type || "application/octet-stream",
file_base64: base64
});
order.invoice_file_url = result.fileUrl || "";
order.invoice_file_name = result.fileName || file.name;
if (result.order){
upsertLocalOrder(result.order);
} else {
queueOrderSave(orderId);
renderWeeks();
}
hideNotices();
} catch (error){
showAuthNotice("Не удалось загрузить счет: " + error.message, "error");
}
}

async function markOrderPaid(orderId){
try {
let result = await callProcurementApi("markPaid", {
order_id: orderId
});
hideNotices();
upsertLocalOrder(result.order);
} catch (error){
showAuthNotice("Не удалось отметить оплату: " + error.message, "error");
}
}

async function deleteOrder(orderId){
let order = getOrderById(orderId);
if (!order) return;
if (order.isLocalOnly){
hideNotices();
removeOrderById(orderId);
return;
}
try {
await callProcurementApi("deleteOrder", {
order_id: orderId
});
hideNotices();
removeOrderById(orderId);
} catch (error){
showAuthNotice("Не удалось удалить строку закупа: " + error.message, "error");
}
}

function addOrderForWeek(weekStartKey){
let order = normalizeOrder({
week_start: weekStartKey,
order_date: weekStartKey,
payment_due_date: getDefaultDueDate(weekStartKey)
}, weekStartKey);
order.isLocalOnly = true;
procurementState.orders.push(order);
renderWeeks();
}

function addOrderGlobal(){
let currentMondayKey = formatDateKey(getMonday(today));
addOrderForWeek(currentMondayKey);
}

function addPlannedOrder(weekStartKey){
let budgetMeta = getPlanBudgetMeta(weekStartKey);
if (budgetMeta.remaining <= 0){
showAuthNotice("План закупа упёрся в доступный бюджет. Сначала увеличь бюджет или уменьши суммы строк.", "error");
return;
}
let order = normalizeOrder({
week_start: weekStartKey,
order_date: "",
payment_due_date: ""
}, weekStartKey);
order.isLocalOnly = true;
procurementState.orders.push(order);
renderWeeks();
}

function handleOrderFieldChange(orderId, field, value){
let order = getOrderById(orderId);
if (!order) return;
  let previousOrderDate = order.order_date;
  let nextValue = field === "order_amount" ? Number(value || 0) : value;
if (field === "order_amount" && order.week_start === getActivePlanWeekKey() && !canFitIntoPlanBudget(orderId, nextValue, order.week_start)){
showAuthNotice("Нельзя превысить бюджет плана закупа. Увеличь бюджет или уменьши суммы строк.", "error");
renderWeeks();
return;
}
order[field] = nextValue;
if (field === "order_date"){
let previousDefaultDue = getDefaultDueDate(previousOrderDate);
if (!order.payment_due_date || order.payment_due_date === previousDefaultDue){
order.payment_due_date = getDefaultDueDate(order.order_date);
}
}
renderWeeks();
queueOrderSave(orderId);
}

function handleWeeksClick(event){
let actionTrigger = event.target.closest("[data-role]");
if (!actionTrigger) return;
let role = actionTrigger.getAttribute("data-role");
if (role === "add-order"){
addOrderForWeek(actionTrigger.getAttribute("data-week-start"));
return;
}
if (role === "add-order-global"){
addOrderGlobal();
return;
}
if (role === "add-plan-order"){
addPlannedOrder(actionTrigger.getAttribute("data-week-start"));
return;
}
if (role === "save-budget-override"){
let weekStartKey = actionTrigger.getAttribute("data-week-start");
let input = document.querySelector(`[data-role="budget-override-input"][data-week-start="${weekStartKey}"]`);
let extraValue = Number(input ? input.value : 0);
let baseBudget = getAutoBudgetForWeek(weekStartKey);
saveBudgetOverride(weekStartKey, baseBudget + Math.max(0, extraValue));
return;
}
if (role === "complete-plan"){
completePlan(actionTrigger.getAttribute("data-week-start"));
return;
}
if (role === "pick-invoice"){
let orderId = actionTrigger.getAttribute("data-order-id");
let input = document.getElementById("invoice-" + orderId);
if (input) input.click();
return;
}
if (role === "mark-paid"){
markOrderPaid(actionTrigger.getAttribute("data-order-id"));
return;
}
if (role === "delete-order"){
deleteOrder(actionTrigger.getAttribute("data-order-id"));
return;
}
}

function handleWeeksChange(event){
let input = event.target;
if (input.classList.contains("order-input")){
handleOrderFieldChange(
  input.getAttribute("data-order-id"),
  input.getAttribute("data-field"),
  input.value
);
return;
}
if (input.classList.contains("invoiceInput")){
uploadInvoice(input.getAttribute("data-order-id"), input.files && input.files[0]);
}
}

function handleGoogleCredential(response){
let profile = decodeJwt(response.credential);
if (!profile || !profile.email){
showAuthNotice("Не удалось прочитать Google-профиль. Попробуй войти снова.", "error");
return;
}
procurementState.idToken = response.credential;
procurementState.user = {
email: profile.email,
name: profile.name || profile.email,
role: "viewer"
};
saveSession();
renderAuthState();
bootstrapProcurement();
}

function initGoogleAuth(){
if (!window.google || !google.accounts || !google.accounts.id){
showSetupNotice("Google Identity Services ещё не загрузился. Обнови страницу.");
return;
}
google.accounts.id.initialize({
client_id: procurementConfig.googleClientId,
callback: handleGoogleCredential,
auto_select: false,
cancel_on_tap_outside: true
});
google.accounts.id.renderButton(
document.getElementById("googleButtonWrap"),
{
theme: "outline",
size: "large",
shape: "pill",
text: "signin_with",
width: 280
}
);
}

function signOut(){
if (window.google && google.accounts && google.accounts.id){
google.accounts.id.disableAutoSelect();
}
clearSession();
hideNotices();
renderAuthState();
}

document.getElementById("signOutButton").addEventListener("click", signOut);
document.getElementById("weeksList").addEventListener("click", handleWeeksClick);
document.getElementById("weeksList").addEventListener("change", handleWeeksChange);

window.addEventListener("load", async () => {
if (!isConfigReady()){
showSetupNotice("Для запуска укажи в procurement.html Google Client ID и Apps Script Web App URL. После этого вход и синхронизация закупа заработают на всех устройствах.");
}

renderAuthState();

let stored = getStoredSession();
if (stored && stored.idToken && stored.user){
procurementState.idToken = stored.idToken;
procurementState.user = stored.user;
renderAuthState();
bootstrapProcurement();
}

let tryInit = () => {
if (window.google && google.accounts && google.accounts.id && isConfigReady()){
initGoogleAuth();
return true;
}
return false;
};

if (!tryInit()){
let guard = window.setInterval(() => {
if (tryInit()){
window.clearInterval(guard);
}
}, 400);
}
});
</script>
</body>
</html>
