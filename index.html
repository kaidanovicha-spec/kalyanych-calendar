<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Календарь Кальяныч</title>
<meta property="og:type" content="website">
<meta property="og:title" content="Календарь Кальяныч">
<meta property="og:description" content="Календарь выручки, себестоимости и валовой выручки.">
<meta property="og:url" content="https://kaidanovicha-spec.github.io/kalyanych-calendar/">
<meta property="og:image" content="https://kaidanovicha-spec.github.io/kalyanych-calendar/k-logo.svg">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Календарь Кальяныч">
<meta name="twitter:description" content="Календарь выручки, себестоимости и валовой выручки.">

<link rel="apple-touch-icon" href="./k-logo.svg">
<style>
body{
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#f5f5f7;
margin:20px;
color:#111;
}

h1{
margin-bottom:20px;
}

.brandTitle{
display:flex;
align-items:center;
gap:14px;
}

.brandLogo{
width:42px;
height:42px;
flex:0 0 auto;
}

.header{
display:flex;
align-items:center;
justify-content:space-between;
max-width:1100px;
margin-bottom:20px;
gap:12px;
}

.monthHeader{
display:flex;
align-items:center;
justify-content:center;
gap:14px;
flex:1;
min-width:0;
}

.monthExpectation{
font-size:14px;
font-weight:600;
color:#666;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
max-width:360px;
}

.monthExpectation.positive{
color:#1b9c4a;
}

.monthExpectation.negative{
color:#d94848;
}

button{
padding:8px 14px;
border-radius:10px;
border:none;
background:black;
color:white;
cursor:pointer;
}

.stats{
display:grid;
grid-template-columns:repeat(7,minmax(0,1fr));
gap:12px;
max-width:1100px;
margin-bottom:20px;
}

.statCard{
background:white;
padding:14px;
border-radius:14px;
box-shadow:0 4px 20px rgba(0,0,0,0.08);
min-width:0;
}

.statCard.positive{
background:#e6f7ea;
}

.statCard.negative{
background:#fdeaea;
}

.statTitle{
font-size:13px;
color:#777;
}

.statValue{
font-size:20px;
font-weight:600;
line-height:1.2;
word-break:break-word;
}

.statCompare{
margin-top:6px;
font-size:12px;
color:#666;
line-height:1.35;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr) 180px;
gap:10px;
max-width:1100px;
margin-top:44px;
}

.weekSummary{
background:white;
border-radius:14px;
padding:12px;
box-shadow:0 4px 20px rgba(0,0,0,0.08);
display:flex;
flex-direction:column;
justify-content:center;
min-height:90px;
}

.weekSummaryTitle{
font-size:12px;
color:#777;
margin-bottom:6px;
}

.weekSummaryValue{
font-size:15px;
font-weight:600;
line-height:1.4;
}

.weekSummaryHeader{
text-align:center;
font-weight:600;
}

.weekday{
text-align:center;
font-weight:600;
}

.day{
background:white;
border-radius:14px;
padding:10px;
min-height:90px;
box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

.revenue{
font-size:14px;
font-weight:700;
margin-bottom:6px;
}

.cost{
font-size:12px;
color:#555;
margin-bottom:4px;
}

.gross{
font-size:12px;
color:#1f6f43;
margin-bottom:8px;
}

.date{
font-size:20px;
font-weight:600;
}

.good{
background:#dff5e3;
}

.medium{
background:#fff4cc;
}

.low{
background:#ffe3e3;
}

.today{
outline:3px solid black;
}

.bestBox{
background:white;
padding:14px;
border-radius:14px;
box-shadow:0 4px 20px rgba(0,0,0,0.08);
max-width:1100px;
margin-bottom:10px;
min-height:160px;
display:flex;
flex-direction:column;
justify-content:flex-start;
}

.reportCardTitle{
font-size:13px;
color:#777;
margin-bottom:10px;
}

.reportCardHeader{
display:flex;
align-items:center;
justify-content:space-between;
gap:12px;
margin-bottom:10px;
}

.reportYearSwitcher{
display:flex;
align-items:center;
gap:8px;
}

.reportYearButton{
padding:4px 10px;
min-width:34px;
border-radius:999px;
font-size:12px;
}

.reportYearValue{
font-size:13px;
font-weight:700;
color:#111;
min-width:54px;
text-align:center;
}

.monthsChart{
display:grid;
grid-template-columns:repeat(12,minmax(0,1fr));
gap:8px;
align-items:end;
height:104px;
margin-bottom:12px;
}

.monthBarWrap{
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-end;
gap:6px;
min-width:0;
cursor:pointer;
border:none;
background:transparent;
padding:0;
}

.monthBar{
width:100%;
max-width:20px;
min-height:6px;
border-radius:8px 8px 0 0;
background:linear-gradient(180deg,#111 0%,#444 100%);
}

.monthBar.red{
background:linear-gradient(180deg,#ff8a8a 0%,#ff4d4d 100%);
}

.monthBar.green{
background:linear-gradient(180deg,#56c271 0%,#1b9c4a 100%);
}

.monthBar.active{
outline:2px solid #111;
outline-offset:3px;
}

.monthBarLabel{
font-size:10px;
color:#666;
line-height:1;
}

.reportButtonRow{
margin-top:auto;
display:flex;
justify-content:center;
}

.reportButton{
display:inline-flex;
align-items:center;
justify-content:center;
padding:12px 16px;
border-radius:12px;
background:#111;
color:#fff;
text-decoration:none;
font-size:14px;
font-weight:600;
width:max-content;
}

.reportButton:hover{
background:#000;
}

.topIndicators{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
max-width:1100px;
margin-bottom:10px;
align-items:stretch;
}

.topIndicators .bestBox,
.topIndicators .targetBox{
margin-bottom:0;
height:100%;
}

.targetBox{
background:white;
padding:14px;
border-radius:14px;
box-shadow:0 4px 20px rgba(0,0,0,0.08);
min-height:160px;
display:flex;
flex-direction:column;
}

.targetHeader{
display:flex;
justify-content:space-between;
align-items:center;
gap:12px;
margin-bottom:10px;
}

.targetTitle{
font-size:13px;
color:#777;
}

.targetState{
font-size:28px;
line-height:1;
}

.targetValue{
font-size:24px;
font-weight:700;
margin-bottom:6px;
}

.targetMeta{
font-size:13px;
color:#666;
margin-bottom:8px;
}

.targetHint{
font-size:13px;
color:#666;
margin-bottom:12px;
}

.targetTrack{
position:relative;
height:22px;
border-radius:999px;
background:#ececf1;
overflow:hidden;
margin-bottom:10px;
}

.targetFill{
position:absolute;
top:0;
bottom:0;
transition:left 0.3s ease,width 0.3s ease;
}

.targetFill.red{
background:linear-gradient(90deg,#ff7b7b,#ff4d4d);
border-radius:999px 0 0 999px;
}

.targetFill.green{
background:linear-gradient(90deg,#56c271,#1b9c4a);
border-radius:0 999px 999px 0;
}

.targetLabels{
display:flex;
justify-content:space-between;
font-size:12px;
color:#777;
}

.targetMidpoint{
position:absolute;
left:50%;
top:-4px;
bottom:-4px;
width:2px;
background:#111;
opacity:0.25;
}

.targetLabelsWide{
display:grid;
grid-template-columns:1fr 1fr 1fr;
font-size:12px;
color:#777;
align-items:center;
margin-top:auto;
}

.targetLabelsWide span:nth-child(2){
text-align:center;
}

.targetLabelsWide span:nth-child(3){
text-align:right;
}

.pinOverlay{
position:fixed;
inset:0;
background:rgba(17,17,17,0.72);
display:flex;
align-items:center;
justify-content:center;
padding:20px;
z-index:1000;
}

.pinOverlay[hidden]{
display:none;
}

.pinCard{
width:100%;
max-width:400px;
background:white;
border-radius:24px;
padding:28px;
box-shadow:0 24px 80px rgba(0,0,0,0.22);
}

.pinTitle{
font-size:28px;
font-weight:700;
margin-bottom:8px;
}

.pinText{
font-size:15px;
color:#666;
margin-bottom:18px;
line-height:1.4;
}

.pinBoxes{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
margin-bottom:14px;
}

.pinBox{
height:64px;
border:2px solid #d7d7dc;
border-radius:16px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:700;
background:#fafafa;
transition:border-color 0.2s ease, transform 0.2s ease, background 0.2s ease;
}

.pinBox.active{
border-color:#111;
background:#fff;
transform:translateY(-1px);
}

.pinHiddenInput{
position:absolute;
opacity:0;
pointer-events:none;
}

.pinError{
font-size:13px;
color:#c62828;
min-height:18px;
margin-bottom:12px;
}

.pinButton{
width:100%;
padding:14px 16px;
border-radius:14px;
font-size:16px;
font-weight:600;
}

.appContent[hidden]{
display:none;
}

@media (max-width: 900px){
.stats{
grid-template-columns:repeat(3,minmax(0,1fr));
}

.topIndicators{
grid-template-columns:1fr;
}
}

@media (max-width: 640px){
body{
margin:14px;
}

.monthHeader{
flex-direction:column;
gap:6px;
}

.monthExpectation{
max-width:none;
font-size:13px;
text-align:center;
white-space:normal;
}

.stats{
grid-template-columns:repeat(2,minmax(0,1fr));
}

.calendar{
grid-template-columns:repeat(7,minmax(88px,1fr)) 180px;
gap:6px;
overflow-x:auto;
}

.day{
padding:8px;
min-height:78px;
}

.date{
font-size:16px;
}

.revenue{
font-size:12px;
}

.statValue{
font-size:18px;
}
}

@media (max-width: 480px){
.stats{
grid-template-columns:1fr;
}
}
</style>
</head>
<body>

<div class="pinOverlay" id="pinOverlay">
<div class="pinCard">
<div class="pinTitle">Доступ к календарю</div>
<div class="pinText">Введи 4-значный PIN-код для просмотра календаря.</div>
<div class="pinBoxes" id="pinBoxes">
<div class="pinBox active" data-index="0"></div>
<div class="pinBox" data-index="1"></div>
<div class="pinBox" data-index="2"></div>
<div class="pinBox" data-index="3"></div>
</div>
<input class="pinHiddenInput" id="pinInput" type="password" inputmode="numeric" maxlength="4" autocomplete="one-time-code">
<div class="pinError" id="pinError"></div>
<button class="pinButton" id="pinButton" type="button">Открыть</button>
</div>
</div>

<div class="appContent" id="appContent" hidden>

<h1 class="brandTitle"><img class="brandLogo" src="./k-logo.svg" alt="К">Календарь Кальяныч</h1>

<div class="header">
<button onclick="changeMonth(-1)">◀</button>
<div class="monthHeader">
<h2 id="monthTitle"></h2>
<div class="monthExpectation" id="monthExpectation"></div>
</div>
<button onclick="changeMonth(1)">▶</button>
</div>

<div class="stats">
<div class="statCard" id="monthTotalCard">
<div class="statTitle">Выручка месяца</div>
<div class="statValue" id="monthTotal"></div>
<div class="statCompare" id="monthTotalCompare"></div>
</div>

<div class="statCard" id="monthAverageCard">
<div class="statTitle">Средняя в день</div>
<div class="statValue" id="monthAverage"></div>
<div class="statCompare" id="monthAverageCompare"></div>
</div>

<div class="statCard">
<div class="statTitle">НДС 5%</div>
<div class="statValue" id="monthNds"></div>
</div>

<div class="statCard">
<div class="statTitle">Себестоимость месяца</div>
<div class="statValue" id="monthCost"></div>
<div class="statCompare" id="costPercentLabel"></div>
</div>

<div class="statCard">
<div class="statTitle">Валовая выручка</div>
<div class="statValue" id="monthGross"></div>
</div>

<div class="statCard" id="forecastCard">
<div class="statTitle">Прогноз месяца</div>
<div class="statValue" id="forecast"></div>
<div class="statCompare" id="forecastCompare"></div>
</div>

<div class="statCard" id="compareCard">
<div class="statTitle">К прошлому году</div>
<div class="statValue" id="compare"></div>
<div class="statCompare" id="compareMeta"></div>
</div>
</div>

<div class="topIndicators" id="topIndicators"></div>
<div class="calendar" id="calendar"></div>
</div>

<script>
let today = new Date();
let year = today.getFullYear();
let month = today.getMonth();
const accessPin = "0489";
const accessSessionKey = "kalyanychCalendarAccessGranted";
const revenueApiUrl = "https://script.google.com/macros/s/AKfycbyPoZgiulk-_qC7hKRxkoOarINnqzsQ5wtLed7rVVSW994dVC2QFxZwyQuT3Dr_hQTJ0w/exec";
let revenueData = {};

const monthNames = [
"Январь","Февраль","Март","Апрель","Май","Июнь",
"Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"
];

const weekdays = ["Пн","Вт","Ср","Чт","Пт","Сб","Вс"];

function formatDate(y,m,d){
let mm = String(m + 1).padStart(2,"0");
let dd = String(d).padStart(2,"0");
return y + "-" + mm + "-" + dd;
}

function formatMoney(value){
return Number(value || 0).toLocaleString("ru-RU") + " ₽";
}

function getBreakEvenTarget(targetYear){
if (targetYear === 2025) return 2750000;
if (targetYear === 2026) return 2900000;
return 2900000;
}

function getCostPercent(targetYear){
if (targetYear === 2025) return 58.6;
if (targetYear === 2026) return 54.6;
return 54.6;
}

function calculateCost(value){
return Math.round(Number(value || 0) * (getCostPercent(year) / 100));
}

function calculateGross(value){
return Math.round(Number(value || 0) - calculateCost(value));
}

function formatDelta(current, previous){
if (previous <= 0){
return "Нет данных для сравнения";
}

let diff = ((current - previous) / previous * 100).toFixed(1);
let sign = Number(diff) > 0 ? "+" : "";
let amount = current - previous;
let amountSign = amount > 0 ? "+" : "";
return amountSign + formatMoney(amount) + " (" + sign + diff + "%) к прошлому месяцу";
}

function getTrend(current, previous){
if (previous <= 0) return "neutral";
if (current > previous) return "positive";
if (current < previous) return "negative";
return "neutral";
}

function applyTrendCard(cardId, trend){
let card = document.getElementById(cardId);
if (!card) return;
card.classList.remove("positive", "negative");
if (trend === "positive" || trend === "negative"){
card.classList.add(trend);
}
}

function revenueClass(v){
if (!v) return "";
if (v >= 140000) return "good";
if (v >= 100000) return "medium";
return "low";
}

function changeMonth(n){
month += n;

if (month < 0){
month = 11;
year--;
}

if (month > 11){
month = 0;
year++;
}

render();
}

function openMonth(targetMonth){
month = targetMonth;
render();
}

function changeChartYear(step){
year += step;
render();
}

function unlockApp(){
document.getElementById("pinOverlay").hidden = true;
document.getElementById("appContent").hidden = false;
sessionStorage.setItem(accessSessionKey, "1");
loadRevenueData();
setInterval(loadRevenueData, 5 * 60 * 1000);
}

function syncPinBoxes(){
let value = document.getElementById("pinInput").value;
let boxes = document.querySelectorAll(".pinBox");

boxes.forEach((box, index) => {
box.textContent = value[index] ? "•" : "";
box.classList.toggle("active", index === Math.min(value.length, 3));
});
}

function checkPin(){
let pinInput = document.getElementById("pinInput");
let pinError = document.getElementById("pinError");

if (pinInput.value === accessPin){
pinError.innerText = "";
unlockApp();
return;
}

pinError.innerText = "Неверный PIN-код";
pinInput.value = "";
syncPinBoxes();
pinInput.focus();
}

function render(){
const calendar = document.getElementById("calendar");
calendar.innerHTML = "";

document.getElementById("monthTitle").innerText = monthNames[month] + " " + year;

weekdays.forEach((dayName) => {
let el = document.createElement("div");
el.className = "weekday";
el.innerText = dayName;
calendar.appendChild(el);
});

let weekHeader = document.createElement("div");
weekHeader.className = "weekSummaryHeader";
weekHeader.innerText = "Итог недели";
calendar.appendChild(weekHeader);

let first = new Date(year, month, 1);
let start = first.getDay();
start = start === 0 ? 6 : start - 1;

let days = new Date(year, month + 1, 0).getDate();

let total = 0;
let count = 0;
let best = null;
let worst = null;
let bestDay = null;
let worstDay = null;

for (let d = 1; d <= days; d++){
let date = formatDate(year, month, d);
let revenue = Number(revenueData[date] || 0);

if (revenue > 0){
total += revenue;
count++;

if (best === null || revenue > best){
best = revenue;
bestDay = d;
}

if (worst === null || revenue < worst){
worst = revenue;
worstDay = d;
}
}
}

let avg = count ? Math.round(total / count) : 0;
let nds = Math.round(total * 0.05);
let forecast = count ? Math.round(avg * days) : 0;
let monthGross = calculateGross(total);
let latestFilledDay = 0;
let monthlyTotals = new Array(12).fill(0);
let previousYearMonthlyTotals = new Array(12).fill(0);

for (let date in revenueData){
let parsed = new Date(date + "T00:00:00");
let value = Number(revenueData[date] || 0);

if (parsed.getMonth() === month && parsed.getFullYear() === year && value > 0){
latestFilledDay = Math.max(latestFilledDay, parsed.getDate());
}

if (parsed.getFullYear() === year && value > 0){
monthlyTotals[parsed.getMonth()] += value;
}

if (parsed.getFullYear() === year - 1 && value > 0){
previousYearMonthlyTotals[parsed.getMonth()] += value;
}
}

let maxMonthlyTotal = Math.max(...monthlyTotals, 1);
let monthShortNames = ["Я","Ф","М","А","М","И","И","А","С","О","Н","Д"];
let breakEvenTarget = getBreakEvenTarget(year);
let monthsChartHtml = monthlyTotals.map((value, index) => {
let barHeight = value > 0 ? Math.max(8, Math.round((value / maxMonthlyTotal) * 78)) : 6;
let barClass = value >= breakEvenTarget ? "green" : "red";
if (index === month) barClass += " active";
let barStyle = "height:" + barHeight + "px;";
return "<button class='monthBarWrap' type='button' onclick='openMonth(" + index + ")' title='" + monthNames[index] + ": " + formatMoney(value) + "'><div class='monthBar " + barClass + "' style='" + barStyle + "'></div><div class='monthBarLabel'>" + monthShortNames[index] + "</div></button>";
}).join("");

let monthExpectation = document.getElementById("monthExpectation");
monthExpectation.innerText = "";
monthExpectation.classList.remove("positive", "negative");

let isCurrentCalendarMonth = year === today.getFullYear() && month === today.getMonth();
if (isCurrentCalendarMonth && month > 0) {
let previousYearCurrentMonth = previousYearMonthlyTotals[month];
let previousYearPrevMonth = previousYearMonthlyTotals[month - 1];

if (previousYearCurrentMonth > 0 && previousYearPrevMonth > 0) {
let expectedDiff = ((previousYearCurrentMonth - previousYearPrevMonth) / previousYearPrevMonth * 100).toFixed(1);
let expectedValue = Math.abs(Number(expectedDiff));

if (Number(expectedDiff) > 0) {
monthExpectation.innerText = "Ожидаем рост на " + expectedValue + "%";
monthExpectation.classList.add("positive");
} else if (Number(expectedDiff) < 0) {
monthExpectation.innerText = "Ожидаем падение на " + expectedValue + "%";
monthExpectation.classList.add("negative");
} else {
monthExpectation.innerText = "Ожидаем без изменений";
}
}
}

document.getElementById("monthTotal").innerText = formatMoney(total);
document.getElementById("monthAverage").innerText = formatMoney(avg);
document.getElementById("monthNds").innerText = formatMoney(nds);
document.getElementById("forecast").innerText = formatMoney(forecast);
document.getElementById("monthGross").innerText = formatMoney(monthGross);
document.getElementById("costPercentLabel").innerText = "Процент себестоимости: " + String(getCostPercent(year)).replace(".", ",") + "%";

let targetDiff = total - breakEvenTarget;
let scaleMax = breakEvenTarget * 2;
let targetPercent = Math.max(0, Math.min((total / scaleMax) * 100, 100));
let redFillWidth = Math.min(targetPercent, 50);
let greenFillWidth = total >= breakEvenTarget ? Math.max(0, targetPercent - 50) : 0;
let targetIcon = "🚗";
if (total >= breakEvenTarget && targetDiff < 500000){
targetIcon = "😎";
}
if (targetDiff >= 500000){
targetIcon = "💰";
}
let targetMessage = total >= breakEvenTarget
? "Выше точки безубыточности на " + formatMoney(targetDiff)
: "До точки безубыточности осталось " + formatMoney(Math.abs(targetDiff));
let remainingDays = Math.max(days - latestFilledDay, 0);
let requiredPerDay = targetDiff >= 0
? 0
: (remainingDays > 0 ? Math.ceil(Math.abs(targetDiff) / remainingDays) : Math.abs(targetDiff));

document.getElementById("topIndicators").innerHTML = count
? "<div class='bestBox'><div class='reportCardHeader'><div class='reportCardTitle'>Выручка по месяцам</div><div class='reportYearSwitcher'><button class='reportYearButton' type='button' onclick='changeChartYear(-1)'>◀</button><div class='reportYearValue'>" + year + "</div><button class='reportYearButton' type='button' onclick='changeChartYear(1)'>▶</button></div></div><div class='monthsChart'>" + monthsChartHtml + "</div><div class='reportButtonRow'><a class='reportButton' href='./Отчет_по_магазинам.html' target='_blank' rel='noopener noreferrer'>Смотреть сводный отчет по сети 2026</a></div></div>" +
"<div class='targetBox'>" +
"<div class='targetHeader'><div class='targetTitle'>Точка безубыточности</div><div class='targetState'>" + targetIcon + "</div></div>" +
"<div class='targetValue'>" + formatMoney(total) + "</div>" +
"<div class='targetMeta'>" + targetMessage + "</div>" +
"<div class='targetHint'>Минимум в день: " + formatMoney(requiredPerDay) + "</div>" +
"<div class='targetTrack'><div class='targetMidpoint'></div><div class='targetFill red' style='left:0%;width:" + redFillWidth + "%;'></div><div class='targetFill green' style='left:50%;width:" + greenFillWidth + "%;'></div></div>" +
"<div class='targetLabelsWide'><span>0 ₽</span><span>" + formatMoney(breakEvenTarget) + "</span><span>" + formatMoney(scaleMax) + "</span></div>" +
"</div>"
: "<div class='bestBox'><div class='reportCardHeader'><div class='reportCardTitle'>Выручка по месяцам</div><div class='reportYearSwitcher'><button class='reportYearButton' type='button' onclick='changeChartYear(-1)'>◀</button><div class='reportYearValue'>" + year + "</div><button class='reportYearButton' type='button' onclick='changeChartYear(1)'>▶</button></div></div><div class='monthsChart'>" + monthsChartHtml + "</div><div class='reportButtonRow'><a class='reportButton' href='./Отчет_по_магазинам.html' target='_blank' rel='noopener noreferrer'>Смотреть сводный отчет по сети 2026</a></div></div>" +
"<div class='targetBox'>" +
"<div class='targetHeader'><div class='targetTitle'>Точка безубыточности</div><div class='targetState'>🚗</div></div>" +
"<div class='targetValue'>0 ₽</div>" +
"<div class='targetMeta'>До точки безубыточности осталось " + formatMoney(breakEvenTarget) + "</div>" +
"<div class='targetHint'>Минимум в день: " + formatMoney(Math.ceil(breakEvenTarget / days)) + "</div>" +
"<div class='targetTrack'><div class='targetMidpoint'></div><div class='targetFill red' style='left:0%;width:0%;'></div></div>" +
"<div class='targetLabelsWide'><span>0 ₽</span><span>" + formatMoney(breakEvenTarget) + "</span><span>" + formatMoney(scaleMax) + "</span></div>" +
"</div>";

let prevMonth = month - 1;
let prevYear = year;

if (prevMonth < 0){
prevMonth = 11;
prevYear--;
}

let prevTotal = 0;
let prevCount = 0;
let prevPeriodTotal = 0;
let prevPeriodCount = 0;
let currentPeriodTotal = 0;
let isCurrentView = month === today.getMonth() && year === today.getFullYear();
let prevMonthDays = new Date(prevYear, prevMonth + 1, 0).getDate();
let previousYear = year - 1;
let workedEntriesCurrentYear = [];
let workedEntriesPreviousYear = [];

let periodEnd = isCurrentView
? (latestFilledDay || Math.min(today.getDate(), days))
: days;
let prevPeriodEnd = Math.min(periodEnd, prevMonthDays);
let weekAnchorDay = latestFilledDay || Math.min(periodEnd, days);
for (let date in revenueData){
let parsed = new Date(date + "T00:00:00");
let value = Number(revenueData[date] || 0);

if (parsed.getMonth() === prevMonth && parsed.getFullYear() === prevYear){
prevTotal += value;

if (value > 0){
prevCount++;
}

if (parsed.getDate() <= prevPeriodEnd && value > 0){
prevPeriodTotal += value;
prevPeriodCount++;
}
}

if (parsed.getMonth() === month && parsed.getFullYear() === year && parsed.getDate() <= periodEnd && value > 0){
currentPeriodTotal += value;
}

if (parsed.getFullYear() === year && value > 0){
workedEntriesCurrentYear.push({ date, value });
}

if (parsed.getFullYear() === previousYear && value > 0){
workedEntriesPreviousYear.push({ date, value });
}

}

let totalSlots = Math.ceil((start + days) / 7) * 7;
let calendarDay = 1;

for (let slot = 0; slot < totalSlots; slot++){
let weekdayIndex = slot % 7;
let hasDate = slot >= start && calendarDay <= days;

if (hasDate){
let date = formatDate(year, month, calendarDay);
let revenue = Number(revenueData[date] || 0);
let cell = document.createElement("div");
let isToday = calendarDay === today.getDate() && month === today.getMonth() && year === today.getFullYear();
let emoji = "";

if (bestDay === calendarDay) emoji = " 🏆";
if (worstDay === calendarDay) emoji = " 😢";
if (bestDay === calendarDay && worstDay === calendarDay) emoji = " 🏆";

cell.className = "day " + revenueClass(revenue) + (isToday ? " today" : "");
cell.innerHTML =
"<div class='revenue'>" + (revenue ? formatMoney(revenue) : "") + "</div>" +
"<div class='cost'>" + (revenue ? "Себестоимость: " + formatMoney(calculateCost(revenue)) : "") + "</div>" +
"<div class='gross'>" + (revenue ? "Валовая: " + formatMoney(calculateGross(revenue)) : "") + "</div>" +
"<div class='date'>" + calendarDay + emoji + "</div>";

calendar.appendChild(cell);
calendarDay++;
} else {
calendar.appendChild(document.createElement("div"));
}

if (weekdayIndex === 6){
let weekStartDay = Math.max(1, slot - 6 - start + 1);
let weekEndDay = Math.min(days, slot - start + 1);
let weekRevenue = 0;
let weekCost = 0;
let weekGross = 0;

if (weekEndDay >= weekStartDay){
for (let day = weekStartDay; day <= weekEndDay; day++){
let revenue = Number(revenueData[formatDate(year, month, day)] || 0);
if (revenue > 0){
weekRevenue += revenue;
weekCost += calculateCost(revenue);
weekGross += calculateGross(revenue);
}
}
}

let weekSummary = document.createElement("div");
let isAnchorWeek = weekAnchorDay > 0 && weekAnchorDay >= weekStartDay && weekAnchorDay <= weekEndDay;
weekSummary.className = "weekSummary" + (isAnchorWeek ? " today" : "");
weekSummary.innerHTML =
"<div class='weekSummaryTitle'>Неделя " + weekStartDay + "-" + weekEndDay + "</div>" +
"<div class='weekSummaryValue'>Выручка: " + formatMoney(weekRevenue) + "<br>Себестоимость: " + formatMoney(weekCost) + "<br>Валовая: " + formatMoney(weekGross) + "</div>";
calendar.appendChild(weekSummary);
}
}

let compare = "—";
workedEntriesCurrentYear.sort((a, b) => a.date.localeCompare(b.date));
workedEntriesPreviousYear.sort((a, b) => a.date.localeCompare(b.date));

let workedDaysCurrentYear = workedEntriesCurrentYear.length;
let matchedWorkedDaysPreviousYear = Math.min(workedDaysCurrentYear, workedEntriesPreviousYear.length);
let comparableCurrentRevenue = workedEntriesCurrentYear
  .slice(0, matchedWorkedDaysPreviousYear)
  .reduce((sum, entry) => sum + Number(entry.value || 0), 0);
let comparablePreviousRevenue = workedEntriesPreviousYear
  .slice(0, matchedWorkedDaysPreviousYear)
  .reduce((sum, entry) => sum + Number(entry.value || 0), 0);
let compareTrend = getTrend(comparableCurrentRevenue, comparablePreviousRevenue);

if (comparablePreviousRevenue > 0 && matchedWorkedDaysPreviousYear > 0){
let diff = ((comparableCurrentRevenue - comparablePreviousRevenue) / comparablePreviousRevenue * 100).toFixed(1);
compare = (Number(diff) > 0 ? "+" : "") + diff + "%";
}

document.getElementById("compare").innerText = compare;
document.getElementById("compareMeta").innerText = matchedWorkedDaysPreviousYear > 0
? matchedWorkedDaysPreviousYear + " дн.: " + formatMoney(comparableCurrentRevenue) + " vs " + formatMoney(comparablePreviousRevenue)
: "Нет данных за " + previousYear + " год";

let periodLabel = isCurrentView ? "1-" + periodEnd + " число" : "полный месяц";
let prevAverageFullMonth = prevCount ? Math.round(prevTotal / prevCount) : 0;
let prevForecast = prevCount ? Math.round((prevTotal / prevCount) * prevMonthDays) : 0;
let monthCost = calculateCost(total);
let monthTotalTrend = getTrend(currentPeriodTotal, prevPeriodTotal);
let monthAverageTrend = getTrend(avg, prevAverageFullMonth);
let forecastTrend = getTrend(forecast, prevForecast);

document.getElementById("monthTotalCompare").innerText =
periodLabel + ": " + formatDelta(currentPeriodTotal, prevPeriodTotal);

document.getElementById("monthAverageCompare").innerText =
"полный месяц: " + formatDelta(avg, prevAverageFullMonth);

document.getElementById("forecastCompare").innerText =
"полный месяц: " + formatDelta(forecast, prevForecast);

document.getElementById("monthCost").innerText = formatMoney(monthCost);
applyTrendCard("monthTotalCard", monthTotalTrend);
applyTrendCard("monthAverageCard", monthAverageTrend);
applyTrendCard("forecastCard", forecastTrend);
applyTrendCard("compareCard", compareTrend);
}

async function loadRevenueData(){
try {
let response = await fetch(revenueApiUrl, { cache: "no-store" });
if (!response.ok){
throw new Error("HTTP " + response.status);
}

let json = await response.json();
revenueData = json && typeof json === "object" ? json : {};
render();
} catch (error) {
console.error("Не удалось загрузить данные календаря:", error);
revenueData = {};
render();
document.getElementById("topIndicators").innerHTML =
"<div class='bestBox'>Не удалось загрузить данные из Google Sheets. Проверь ссылку Apps Script и доступ к веб-приложению.</div>";
}
}

document.getElementById("pinInput").addEventListener("keydown", (event) => {
if (event.key === "Enter") checkPin();
});
document.getElementById("pinInput").addEventListener("input", (event) => {
event.target.value = event.target.value.replace(/\D/g, "").slice(0, 4);
syncPinBoxes();
});
document.getElementById("pinBoxes").addEventListener("click", () => {
document.getElementById("pinInput").focus();
});

if (sessionStorage.getItem(accessSessionKey) === "1"){
unlockApp();
} else {
document.getElementById("pinInput").focus();
syncPinBoxes();
}
